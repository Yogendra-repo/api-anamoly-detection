name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]

# Ensure the GITHUB_TOKEN used by the workflow has write access to repository contents
# so the deploy action can push to the `gh-pages` branch. This avoids the 403 for
# github-actions[bot] seen when the token is read-only.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (set base automatically)
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build
        working-directory: frontend

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
